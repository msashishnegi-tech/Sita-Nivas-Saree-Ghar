<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - LUXE Fashion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="bg-gray-100">
    <!-- Login Page -->
    <div id="loginPage" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-gradient-to-br from-[#e94560] to-[#d4af37] rounded-xl flex items-center justify-center mx-auto mb-4">
                    <span class="text-white font-bold text-2xl">L</span>
                </div>
                <h1 class="text-2xl font-bold">Admin Login</h1>
                <p class="text-gray-500 mt-2">Sita Nivas Saree Ghar</p>
            </div>
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <input type="text" id="username" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-[#e94560] focus:ring-2 focus:ring-red-100 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="password" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-[#e94560] focus:ring-2 focus:ring-red-100 outline-none">
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-[#e94560] to-[#c0392b] text-white py-3 rounded-xl font-semibold hover:shadow-lg transition-all">
                    Login
                </button>
                <div id="loginError" class="text-red-500 text-sm text-center hidden"></div>
            </form>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="hidden">
        <!-- Header -->
        <header class="bg-white shadow-sm">
            <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-[#e94560] to-[#d4af37] rounded-xl flex items-center justify-center">
                        <span class="text-white font-bold">L</span>
                    </div>
                    <h1 class="text-xl font-bold">Admin Dashboard</h1>
                </div>
                <button onclick="logout()" class="px-4 py-2 bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors">
                    Logout
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="max-w-7xl mx-auto px-4 py-8">
            <!-- Stats -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-6 rounded-xl shadow-sm">
                    <p class="text-gray-500 text-sm">Total Products</p>
                    <p id="totalProducts" class="text-3xl font-bold mt-2">0</p>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm">
                    <p class="text-gray-500 text-sm">In Stock</p>
                    <p id="inStock" class="text-3xl font-bold mt-2 text-green-600">0</p>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm">
                    <p class="text-gray-500 text-sm">Out of Stock</p>
                    <p id="outOfStock" class="text-3xl font-bold mt-2 text-red-600">0</p>
                </div>
            </div>

            <!-- Products Section -->
            <div class="bg-white rounded-xl shadow-sm">
                <div class="p-6 border-b flex items-center justify-between">
                    <h2 class="text-xl font-bold">Products</h2>
                    <button onclick="openAddModal()" class="bg-gradient-to-r from-[#e94560] to-[#c0392b] text-white px-6 py-2 rounded-lg font-semibold hover:shadow-lg transition-all">
                        + Add Product
                    </button>
                </div>
                <div id="productsList" class="p-6">
                    <!-- Products will be loaded here -->
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Product Modal -->
    <div id="productModal" class="modal">
        <div class="bg-white rounded-2xl p-8 w-full max-w-2xl mx-4 max-h-[90vh] overflow-y-auto">
            <div class="flex items-center justify-between mb-6">
                <h2 id="modalTitle" class="text-2xl font-bold">Add Product</h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            </div>
            <form id="productForm" class="space-y-4">
                <input type="hidden" id="productId">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Product Name *</label>
                        <input type="text" id="productName" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-[#e94560] outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Category *</label>
                        <select id="productCategory" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-[#e94560] outline-none">
                            <option value="men">Men</option>
                            <option value="women">Women</option>
                            <option value="kids">Kids</option>
                            <option value="accessories">Accessories</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Price (₹) *</label>
                        <input type="number" id="productPrice" required min="0" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-[#e94560] outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Sale Price (₹)</label>
                        <input type="number" id="productSalePrice" min="0" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-[#e94560] outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Stock *</label>
                        <input type="number" id="productStock" required min="0" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-[#e94560] outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Image URL *</label>
                        <input type="url" id="productImage" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-[#e94560] outline-none" placeholder="https://...">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Description *</label>
                    <textarea id="productDescription" required rows="3" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-[#e94560] outline-none"></textarea>
                </div>
                <div class="flex gap-4 pt-4">
                    <button type="submit" class="flex-1 bg-gradient-to-r from-[#e94560] to-[#c0392b] text-white py-3 rounded-xl font-semibold hover:shadow-lg transition-all">
                        Save Product
                    </button>
                    <button type="button" onclick="closeModal()" class="flex-1 bg-gray-100 text-gray-700 py-3 rounded-xl font-semibold hover:bg-gray-200 transition-all">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let authToken = localStorage.getItem('adminToken');
        let products = [];

        // Check if already logged in
        if (authToken) {
            showDashboard();
            loadProducts();
        }

        // Login Form
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    authToken = data.token;
                    localStorage.setItem('adminToken', authToken);
                    showDashboard();
                    loadProducts();
                } else {
                    document.getElementById('loginError').textContent = data.message;
                    document.getElementById('loginError').classList.remove('hidden');
                }
            } catch (error) {
                document.getElementById('loginError').textContent = 'Login failed. Please try again.';
                document.getElementById('loginError').classList.remove('hidden');
            }
        });

        function showDashboard() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
        }

        function logout() {
            localStorage.removeItem('adminToken');
            authToken = null;
            location.reload();
        }

        async function loadProducts() {
            try {
                const response = await fetch('/api/products');
                products = await response.json();
                renderProducts();
                updateStats();
            } catch (error) {
                console.error('Failed to load products:', error);
            }
        }

        function renderProducts() {
            const list = document.getElementById('productsList');
            if (products.length === 0) {
                list.innerHTML = '<p class="text-center text-gray-500 py-8">No products yet. Click "Add Product" to get started.</p>';
                return;
            }

            list.innerHTML = `
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead>
                            <tr class="text-left border-b">
                                <th class="pb-3 font-medium text-gray-600">Product</th>
                                <th class="pb-3 font-medium text-gray-600">Category</th>
                                <th class="pb-3 font-medium text-gray-600">Price</th>
                                <th class="pb-3 font-medium text-gray-600">Stock</th>
                                <th class="pb-3 font-medium text-gray-600">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${products.map(p => `
                                <tr class="border-b hover:bg-gray-50">
                                    <td class="py-4">
                                        <div class="flex items-center gap-3">
                                            <img src="${p.image}" alt="${p.name}" class="w-12 h-12 rounded-lg object-cover">
                                            <div>
                                                <p class="font-medium">${p.name}</p>
                                                <p class="text-sm text-gray-500">${p.description.substring(0, 50)}...</p>
                                            </div>
                                        </div>
                                    </td>
                                    <td class="py-4 capitalize">${p.category}</td>
                                    <td class="py-4">
                                        <p class="font-semibold">₹${p.salePrice || p.price}</p>
                                        ${p.salePrice ? `<p class="text-sm text-gray-400 line-through">₹${p.price}</p>` : ''}
                                    </td>
                                    <td class="py-4">
                                        <span class="${p.stock > 0 ? 'text-green-600' : 'text-red-600'} font-semibold">
                                            ${p.stock}
                                        </span>
                                    </td>
                                    <td class="py-4">
                                        <div class="flex gap-2">
                                            <button onclick="editProduct('${p.id}')" class="px-3 py-1 bg-blue-100 text-blue-600 rounded-lg hover:bg-blue-200 text-sm">
                                                Edit
                                            </button>
                                            <button onclick="deleteProduct('${p.id}')" class="px-3 py-1 bg-red-100 text-red-600 rounded-lg hover:bg-red-200 text-sm">
                                                Delete
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function updateStats() {
            document.getElementById('totalProducts').textContent = products.length;
            document.getElementById('inStock').textContent = products.filter(p => p.stock > 0).length;
            document.getElementById('outOfStock').textContent = products.filter(p => p.stock === 0).length;
        }

        function openAddModal() {
            document.getElementById('modalTitle').textContent = 'Add Product';
            document.getElementById('productForm').reset();
            document.getElementById('productId').value = '';
            document.getElementById('productModal').classList.add('active');
        }

        function editProduct(id) {
            const product = products.find(p => p.id === id);
            if (!product) return;

            document.getElementById('modalTitle').textContent = 'Edit Product';
            document.getElementById('productId').value = product.id;
            document.getElementById('productName').value = product.name;
            document.getElementById('productCategory').value = product.category;
            document.getElementById('productPrice').value = product.price;
            document.getElementById('productSalePrice').value = product.salePrice || '';
            document.getElementById('productStock').value = product.stock;
            document.getElementById('productImage').value = product.image;
            document.getElementById('productDescription').value = product.description;
            document.getElementById('productModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('productModal').classList.remove('active');
        }

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const product = {
                name: document.getElementById('productName').value,
                category: document.getElementById('productCategory').value,
                price: parseInt(document.getElementById('productPrice').value),
                salePrice: parseInt(document.getElementById('productSalePrice').value) || null,
                stock: parseInt(document.getElementById('productStock').value),
                image: document.getElementById('productImage').value,
                description: document.getElementById('productDescription').value
            };

            const id = document.getElementById('productId').value;
            const method = id ? 'PUT' : 'POST';
            
            if (id) product.id = id;

            try {
                const response = await fetch('/api/admin/products', {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify(product)
                });

                if (response.ok) {
                    closeModal();
                    loadProducts();
                    alert(id ? 'Product updated successfully!' : 'Product added successfully!');
                } else {
                    alert('Failed to save product');
                }
            } catch (error) {
                alert('Error saving product');
            }
        });

        async function deleteProduct(id) {
            if (!confirm('Are you sure you want to delete this product?')) return;

            try {
                const response = await fetch(`/api/admin/products?id=${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                if (response.ok) {
                    loadProducts();
                    alert('Product deleted successfully!');
                } else {
                    alert('Failed to delete product');
                }
            } catch (error) {
                alert('Error deleting product');
            }
        }
    </script>
</body>
</html>
